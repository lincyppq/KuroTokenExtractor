name: Build iOS dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build dylib
      run: |
        # 直接使用 clang 编译 dylib
        clang -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -mios-version-min=11.0 \
          -dynamiclib \
          -framework Foundation \
          -framework UIKit \
          -framework Security \
          -framework CoreGraphics \
          -framework QuartzCore \
          -fobjc-arc \
          -o KuroTokenExtractor.dylib \
          Tweak.m

        # 签名（TrollStore 需要）
        codesign -f -s - KuroTokenExtractor.dylib

        echo "Build complete!"
        ls -lh KuroTokenExtractor.dylib

    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: KuroTokenExtractor-dylib
        path: KuroTokenExtractor.dylib

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: KuroTokenExtractor.dylib
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
